server:
  port: 8084

spring:
  application:
    name: AQUASENSE-SENSOR-SERVICE

  data:
    mongodb:
      uri: mongodb://localhost:27017/aquasense_sensor_db

  webflux:
    base-path: /api

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
